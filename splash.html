<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir AI - نسخه ZX-5</title>
    <link rel="stylesheet" href="style.css?v=60">
    <script type="module">
        import { injectSpeedInsights } from '/speed-insights.js';
        injectSpeedInsights();
    </script>
    <style>
        /* استایل‌های اختصاصی همین صفحه لودینگ */
        .splash-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #0b0f19;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .splash-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px 50px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            animation: fadeIn 0.8s ease;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .btn-continue {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 14px 36px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
        }

        .btn-continue:hover {
            background: #3b82f6;
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="ai-dark-page">

    <div class="splash-container">
        <!-- گوی‌های نورانی پس‌زمینه -->
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>

        <div class="splash-card">
            <h1 style="font-size: 32px; margin-bottom: 5px;">هوش مصنوعی امیر</h1>
            <div class="version-badge">نسخه ZX-5</div>
            
            <p style="color: #94a3b8; margin-bottom: 25px;">سیستم آماده پاسخگویی به سوالات و پروژه‌های شماست.</p>

            <!-- دکمه ادامه برای ورود به چت -->
            <a href="chat.html" class="btn-continue">
                <span>ادامه و ورود به محیط چت</span>
                <span>←</span>
            </a>
        </div>
    </div>

</body>

</html>
