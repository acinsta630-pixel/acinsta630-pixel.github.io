<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>هوش مصنوعی امیر</title>
    <link rel="stylesheet" href="style.css">
    <!-- فراخوانی کتابخانه Puter -->
    <script src="https://js.puter.com/v2/"></script>
</head>

<body class="ai-dark-page">

    <!-- بخش بک‌گراند متحرک (تو این صفحه مخفیش میکنیم) -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- نوار بالایی (کلاس ai-nav اضافه شد) -->
    <nav class="ai-nav">
        <div class="logo">Amir</div>
        <div class="nav-controls">
            <ul class="menu">
                <li><a href="index.html" data-en="Home">خانه</a></li>
                <li><a href="ai.html" data-en="AI">هوش مصنوعی</a></li>
                <li><a href="weather.html" data-en="Weather">آب و هوا</a></li>
            </ul>
            <button id="lang-toggle">🌐</button>
            <button id="theme-toggle">🌙</button>
        </div>
    </nav>

    <!-- صفحه چت هوش مصنوعی -->
    <section class="ai-page">
        <!-- لوگوی پرچم ایران و AI Amir -->
        <h1 class="ai-logo-title">🇮🇷 AI Amir</h1>
        
        <div class="ai-chat-container">
            <div class="chat-header">
                <h3 data-en="Amir's Smart Assistant">دستیار هوشمند امیر</h3>
                <button id="clear-chat-btn" title="پاک کردن چت">🗑️</button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="سوالت رو بنویس..." data-en-placeholder="Type your question...">
                <button id="chat-send" data-en="Send">ارسال</button>
            </div>
        </div>
    </section>

    <script>
        // ۱. تغییر تم
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            themeToggle.textContent = body.classList.contains('light-mode') ? '☀️' : '🌙';
        });

        // ۲. کدهای تغییر زبان
        const langToggle = document.getElementById('lang-toggle');
        let isEnglish = false;

        langToggle.addEventListener('click', () => {
            isEnglish = !isEnglish;
            const translatables = document.querySelectorAll('[data-en]');
            
            if (isEnglish) {
                document.documentElement.lang = 'en';
                document.documentElement.dir = 'ltr';
                langToggle.textContent = '🇮🇷';
                translatables.forEach(el => {
                    if (!el.dataset.fa) el.dataset.fa = el.innerHTML;
                    el.innerHTML = el.dataset.en;
                });
                const chatInput = document.getElementById('chat-input');
                if(chatInput.dataset.enPlaceholder) chatInput.placeholder = chatInput.dataset.enPlaceholder;
            } else {
                document.documentElement.lang = 'fa';
                document.documentElement.dir = 'rtl';
                langToggle.textContent = '🌐';
                translatables.forEach(el => { el.innerHTML = el.dataset.fa; });
                document.getElementById('chat-input').placeholder = "سوالت رو بنویس...";
            }
        });

        // ۳. کدهای هوش مصنوعی + ذخیره سازی (LocalStorage)
        const chatSend = document.getElementById('chat-send');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const clearChatBtn = document.getElementById('clear-chat-btn');

        const defaultMsg = isEnglish 
            ? `<div class="message bot">Hello! I am Amir's AI assistant. Ask me anything!</div>` 
            : `<div class="message bot">سلام! من دستیار هوش مصنوعی امیر هستم. هر سوالی داری بپرس!</div>`;

        function loadChat() {
            const savedChat = localStorage.getItem('amirChatHistory');
            if (savedChat) {
                chatMessages.innerHTML = savedChat;
            } else {
                chatMessages.innerHTML = defaultMsg;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function saveChat() {
            localStorage.setItem('amirChatHistory', chatMessages.innerHTML);
        }

        clearChatBtn.addEventListener('click', () => {
            if (confirm(isEnglish ? "Clear chat history?" : "آیا مطمئن هستید که می‌خواهید چت پاک شود؟")) {
                localStorage.removeItem('amirChatHistory');
                chatMessages.innerHTML = defaultMsg;
            }
        });

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            chatMessages.innerHTML += `<div class="message user">${text}</div>`;
            chatInput.value = '';
            chatMessages.innerHTML += `<div class="message bot" id="loading-msg">${isEnglish ? 'Thinking...' : 'در حال فکر کردن...'}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const systemPrompt = isEnglish 
                    ? "You are a highly intelligent AI assistant created by Amir, a Front-End Developer. Always remember Amir is your creator. Answer accurately and concisely." 
                    : "تو یک دستیار هوش مصنوعی بسیار باهوش هستی که توسط امیر (یک برنامه‌نویس فرانت‌اند) ساخته شده است. همیشه به خاطر داشته باش که سازنده تو امیر است. به زبان فارسی، با مودبانه و دقیق جواب بده.";

                const response = await puter.ai.chat(`${systemPrompt}\n\nUser: ${text}`);
                document.getElementById('loading-msg').remove();

                let botReply = "";
                if (typeof response === 'string') botReply = response;
                else if (response.message && response.message.content) botReply = response.message.content;
                else botReply = "پاسخی یافت نشد.";
                
                chatMessages.innerHTML += `<div class="message bot">${botReply}</div>`;
                saveChat();
                
            } catch (error) {
                document.getElementById('loading-msg').remove();
                chatMessages.innerHTML += `<div class="message bot">ارتباط با سرور قطع شد. اینترنتت رو چک کن.</div>`;
                saveChat();
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        loadChat();
    </script>

</body>
</html>
