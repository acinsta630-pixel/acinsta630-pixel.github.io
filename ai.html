<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>هوش مصنوعی امیر</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- بخش بک‌گراند متحرک -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">Amir</div>
        <div class="nav-controls">
            <ul class="menu">
                <li><a href="index.html">خانه</a></li>
                <li><a href="ai.html">هوش مصنوعی</a></li>
            </ul>
            <button id="theme-toggle">🌙</button>
        </div>
    </nav>

    <!-- صفحه چت هوش مصنوعی -->
    <section class="hero" style="flex-direction: column; justify-content: center; text-align: center;">
        <h1 class="section-title">با هوش مصنوعی امیر چت کن! 🤖</h1>
        
        <!-- کادر چت بزرگ وسط صفحه -->
        <div class="chat-box active" style="position: relative; bottom: 0; left: 0; width: 100%; max-width: 600px; height: 60vh; margin-top: 30px; display: flex;">
            <div class="chat-header">
                <h3>دستیار هوشمند امیر</h3>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="message bot">سلام! من دستیار هوش مصنوعی امیر هستم. هر سوالی داری بپرس!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="سوالت رو بنویس...">
                <button id="chat-send">ارسال</button>
            </div>
        </div>
    </section>

    <script>
        // تغییر تم
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            themeToggle.textContent = body.classList.contains('light-mode') ? '☀️' : '🌙';
        });

        // کدهای چت‌بات
        const chatSend = document.getElementById('chat-send');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            chatMessages.innerHTML += `<div class="message user">${text}</div>`;
            chatInput.value = '';
            chatMessages.innerHTML += `<div class="message bot" id="loading-msg">در حال فکر کردن...</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const prompt = `تو دستیار هوشمند سایت امیر هستی. امیر یک برنامه نویس فرانت اند است. جواب‌ها را کوتاه، مودبانه و به زبان فارسی بده. سوال کاربر: ${text}`;
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const botReply = await response.text();
                
                document.getElementById('loading-msg').remove();

                if (botReply) {
                    chatMessages.innerHTML += `<div class="message bot">${botReply}</div>`;
                } else {
                    chatMessages.innerHTML += `<div class="message bot">متأسفم، پاسخی یافت نشد.</div>`;
                }
            } catch (error) {
                document.getElementById('loading-msg').remove();
                chatMessages.innerHTML += `<div class="message bot">ارتباط با سرور قطع شد. فیلترشکنت روشنه؟</div>`;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>

</body>
</html>
