<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>Amir AI Admin 🧠</title>


<style>

body{

font-family:tahoma;
background:#111827;
color:white;
padding:30px;

}


.box{

background:#1f2937;
padding:25px;
border-radius:20px;
max-width:600px;
margin:auto;

}


input,textarea{

width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;

}


button{

padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
font-size:16px;

}


.card{

background:#374151;
padding:15px;
margin-top:15px;
border-radius:15px;

}


.delete{

background:#ef4444;

}


</style>

</head>



<body>


<div class="box">


<h1>
🧠 Amir AI Admin
</h1>


<h3>
آموزش جدید بده
</h3>


<input 
id="question"
placeholder="سوال"
/>


<textarea 
id="answer"
placeholder="جواب">
</textarea>



<button onclick="teach()">
یاد بده 🚀
</button>



<h2>
📚 چیزهایی که یاد گرفته:
</h2>



<div id="list"></div>


</div>






<script>


let learned = JSON.parse(

localStorage.getItem("amir_learned")

) || [];





function teach(){


let q =
document.getElementById("question").value;


let a =
document.getElementById("answer").value;



if(!q || !a){

alert("سوال و جواب را بنویس");

return;

}



learned.push({

keywords:[q],

answers:[a]

});



save();


document.getElementById("question").value="";

document.getElementById("answer").value="";



show();



alert(
"یاد گرفتم 🧠✅"
);


}







function save(){


localStorage.setItem(

"amir_learned",

JSON.stringify(learned)

);


}








function removeItem(index){


learned.splice(index,1);


save();


show();


}







function show(){


let box =
document.getElementById("list");


box.innerHTML="";



learned.forEach((item,index)=>{



box.innerHTML += `


<div class="card">


<b>
${item.keywords[0]}
</b>


<p>
${item.answers[0]}
</p>


<button 
class="delete"
onclick="removeItem(${index})">

حذف 🗑️

</button>


</div>


`;


});



}




show();



</script>



</body>

</html>
