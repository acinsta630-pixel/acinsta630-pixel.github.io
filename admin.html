<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
<script type="module">
    import { injectSpeedInsights } from '/speed-insights.js';
    injectSpeedInsights();
</script>
Amir AI Admin v8 🧠
</title>


<style>

body{

font-family:tahoma;
background:#111827;
color:white;
padding:30px;

}


.box{

background:#1f2937;
padding:25px;
border-radius:20px;
max-width:700px;
margin:auto;

}


input,textarea{

width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;

}


button{

padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
font-size:16px;
margin:5px;

}



.card{

background:#374151;
padding:15px;
margin-top:15px;
border-radius:15px;

}



.delete{

background:#ef4444;

}



.edit{

background:#3b82f6;

}



.count{

background:#0f766e;
padding:10px;
border-radius:10px;

}



</style>

</head>




<body>


<div class="box">


<h1>
🧠 Amir AI Admin v8
</h1>


<div class="count" id="count">

</div>



<h3>
آموزش جدید بده 🚀
</h3>


<input 
id="question"
placeholder="سوال"
/>


<textarea 
id="answer"
placeholder="جواب">
</textarea>



<button onclick="teach()">

یاد بده 🧠

</button>




<h2>
📚 حافظه Amir AI
</h2>



<input
id="search"
placeholder="جستجو 🔍"
oninput="show()"
/>




<div id="list">

</div>



</div>






<script>


let learned = JSON.parse(

localStorage.getItem(
"amir_learned"
)

) || [];







function save(){


localStorage.setItem(

"amir_learned",

JSON.stringify(learned)

);


}









function teach(){



let q =
document.getElementById(
"question"
).value.trim();



let a =
document.getElementById(
"answer"
).value.trim();





if(!q || !a){

alert(
"سوال و جواب را بنویس"
);

return;

}







let old =
learned.find(item =>

item.keywords.includes(q)

);






if(old){



if(
!old.answers.includes(a)
){


old.answers.push(a);


}



}

else{


learned.push({


keywords:[
q
],


answers:[
a
]


});


}







save();



show();




document.getElementById(
"question"
).value="";


document.getElementById(
"answer"
).value="";




alert(
"یاد گرفتم 🧠✅"
);



}









function show(){



let box =
document.getElementById(
"list"
);



let search =
document.getElementById(
"search"
).value
.toLowerCase();




box.innerHTML="";





document.getElementById(
"count"
).innerHTML =

"🧠 تعداد آموزش‌ها: "
+
learned.length;







learned.forEach((item,index)=>{


let q =
item.keywords[0];


let a =
item.answers.join(
"<br>"
);





if(
q.toLowerCase()
.includes(search)
){



box.innerHTML += `


<div class="card">


<b>
${q}
</b>


<p>
${a}
</p>



<button
class="edit"
onclick="editItem(${index})">

ویرایش ✏️

</button>



<button
class="delete"
onclick="removeItem(${index})">

حذف 🗑️

</button>



</div>


`;



}



});




}









function removeItem(index){


learned.splice(
index,
1
);



save();


show();


}









function editItem(index){


let q =
prompt(
"سوال جدید:",
learned[index].keywords[0]
);



let a =
prompt(
"جواب جدید:",
learned[index].answers[0]
);





if(q && a){



learned[index].keywords=[
q
];


learned[index].answers=[
a
];



save();


show();


}


}







show();



console.log(
"🧠 Amir Admin v8 Ready"
);



</script>


</body>

</html>
